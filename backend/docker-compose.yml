services:
  postgres:
    image: postgres:16
    container_name: maisonparfait-postgres
    environment:
      POSTGRES_DB: maisonparfait
      POSTGRES_USER: zeynepates
      POSTGRES_PASSWORD: "123456"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: maisonparfait-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: "123456"
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata: