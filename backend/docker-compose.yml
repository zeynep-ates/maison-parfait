services:
  backend:
    build:
      context: .
    container_name: maisonparfait-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/maisonparfait
      DB_USERNAME: zeynepates
      DB_PASSWORD: "123456"
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-very-long-secret-at-least-32-chars}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: maisonparfait-postgres
    environment:
      POSTGRES_DB: maisonparfait
      POSTGRES_USER: zeynepates
      POSTGRES_PASSWORD: "123456"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: maisonparfait-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: "123456"
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
  uploads: