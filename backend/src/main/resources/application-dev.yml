spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/maisonparfait}
    username: ${DB_USERNAME:zeynepates}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO

springdoc:
  default-flat-param-object: true

security:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-secret-at-least-32-chars}
    ttl-seconds: ${JWT_TTL_SECONDS:86400}
    # identity module's access token - kept separate from the legacy
    # ttl-seconds above (used by modules.auth until it's deleted in
    # Phase 1F) since the two mean different things: this one is
    # deliberately short-lived per docs/identity-module-design.md.
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:900}
  refresh-token:
    ttl-seconds: ${REFRESH_TOKEN_TTL_SECONDS:604800}
    remember-me-ttl-seconds: ${REFRESH_TOKEN_REMEMBER_ME_TTL_SECONDS:2592000}

app:
  uploads:
    dir: uploads
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}