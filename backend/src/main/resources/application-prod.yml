spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

logging:
  level:
    root: INFO

security:
  jwt:
    secret: ${JWT_SECRET}
    ttl-seconds: ${JWT_TTL_SECONDS:86400}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:900}
  refresh-token:
    ttl-seconds: ${REFRESH_TOKEN_TTL_SECONDS:604800}
    remember-me-ttl-seconds: ${REFRESH_TOKEN_REMEMBER_ME_TTL_SECONDS:2592000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
